name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libgbm-dev libdrm-dev pkg-config

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Build (default features)
        run: cargo build --release

      - name: Build (pipewire_capture feature)
        run: |
          sudo apt-get install -y libpipewire-0.3-dev libdbus-1-dev
          cargo build --release --features pipewire_capture

      - name: Run tests
        run: cargo test --release
