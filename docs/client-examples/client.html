<!DOCTYPE html>
<html lang="uk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Screen Stream Client</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #statusbar {
    padding: 0 16px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #666;
    flex-shrink: 0;
    height: 36px;
    align-items: center;
  }
  #statusbar span { color: #e0e0e0; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; display: inline-block; margin-right: 6px;
    transition: background 0.3s;
  }
  #status-dot.connected { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
  #status-dot.connecting { background: #fbbf24; }
  #status-dot.error     { background: #f87171; }
  #btn-mode {
    margin-left: auto; padding: 2px 10px;
    background: #222; border: 1px solid #444; color: #e0e0e0;
    font-family: 'Courier New', monospace; font-size: 11px;
    cursor: pointer; border-radius: 3px; user-select: none;
  }
  #btn-mode:hover { background: #333; }

  #viewport {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  #viewport.scroll { overflow: auto; }

  #display-canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    background: #000;
  }

  #overlay {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; color: #444; pointer-events: none; z-index: 10;
  }
  #overlay p { font-size: 14px; margin-top: 8px; }
</style>
</head>
<body>

<div id="statusbar">
  <div><span id="status-dot"></span><span id="status-text">Підключення...</span></div>
  <div>Тайлів/с: <span id="tiles">—</span></div>
  <div>Трафік: <span id="frame-size">—</span></div>
  <div>Латентність: <span id="latency">—</span></div>
  <div>Розмір: <span id="info">—</span></div>
  <button id="btn-mode">FIT</button>
</div>

<div id="viewport">
  <canvas id="display-canvas"></canvas>
  <div id="overlay"><p>Очікування підключення через WebRTC...<br><small id="server-label">Server: ws://localhost:9001</small></p></div>
</div>

<script>
  const viewport    = document.getElementById('viewport');
  const dispCanvas  = document.getElementById('display-canvas');
  const dispCtx     = dispCanvas.getContext('2d', {
    alpha: false,
    desynchronized: true
  });
  const overlay     = document.getElementById('overlay');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const tilesEl     = document.getElementById('tiles');
  const frameSizeEl = document.getElementById('frame-size');
  const latencyEl   = document.getElementById('latency');
  const infoEl      = document.getElementById('info');
  const btnMode     = document.getElementById('btn-mode');

  let mode    = 'fit';
  let screenW = 0;
  let screenH = 0;

  let offscreen = null;
  let offCtx    = null;
  let dst = { x: 0, y: 0, w: 0, h: 0 };

  const pending = [];
  let rafId = null;

  function scheduleRaf() {
    if (!rafId) rafId = requestAnimationFrame(renderFrame);
  }

  function renderFrame() {
    rafId = null;
    if (!offscreen) return;

    for (const { bitmap, x, y, w, h } of pending) {
      offCtx.drawImage(bitmap, x, y, w, h);
      bitmap.close();
    }
    pending.length = 0;

    if (mode === 'fit') {
      dispCtx.clearRect(0, 0, dispCanvas.width, dispCanvas.height);
    }
    dispCtx.drawImage(offscreen, dst.x, dst.y, dst.w, dst.h);
  }

  function applyMode() {
    if (!screenW) return;
    const dpr  = window.devicePixelRatio || 1;
    const rect = viewport.getBoundingClientRect();
    const vw   = rect.width;
    const vh   = rect.height;
    if (!vw || !vh) return;

    if (mode === 'fit') {
      viewport.classList.remove('scroll');
      btnMode.textContent = 'FIT';
      const scale = Math.min(vw / screenW, vh / screenH);
      const dw = Math.round(screenW * scale);
      const dh = Math.round(screenH * scale);
      dst = {
        x: Math.round((vw - dw) / 2) * dpr,
        y: Math.round((vh - dh) / 2) * dpr,
        w: dw * dpr,
        h: dh * dpr
      };
      dispCanvas.width        = Math.round(vw * dpr);
      dispCanvas.height       = Math.round(vh * dpr);
      dispCanvas.style.width  = vw + 'px';
      dispCanvas.style.height = vh + 'px';
    } else {
      viewport.classList.add('scroll');
      btnMode.textContent = '1:1';
      dst = { x: 0, y: 0, w: screenW, h: screenH };
      dispCanvas.width        = screenW;
      dispCanvas.height       = screenH;
      dispCanvas.style.width  = screenW + 'px';
      dispCanvas.style.height = screenH + 'px';
    }
    if (offscreen) scheduleRaf();
  }

  function initFrame(w, h) {
    screenW = w;
    screenH = h;
    offscreen = new OffscreenCanvas(w, h);
    offCtx    = offscreen.getContext('2d', { alpha: false });
    infoEl.textContent = w + 'x' + h;
    requestAnimationFrame(applyMode);
  }

  btnMode.addEventListener('click', () => {
    mode = mode === 'fit' ? 'scroll' : 'fit';
    applyMode();
  });

  window.addEventListener('resize', () => {
    requestAnimationFrame(() => { if (mode === 'fit') applyMode(); });
  });

  // Статистика
  let tileCount     = 0;
  let totalBytes    = 0;
  let lastStatTime  = 0;
  let latencySum    = 0;
  let latencyCount  = 0;

  function resetStats() {
    tileCount     = 0;
    totalBytes    = 0;
    lastStatTime  = Date.now();
    latencySum    = 0;
    latencyCount  = 0;
  }

  // WebRTC з мінімальною латентністю
  let pc = null;
  let dataChannel = null;
  let ws = null;
  let currentSession = null; // echoed back to the server so it can tell a
                              // stale (abandoned) negotiation attempt apart
                              // from the current one after a reconnect
  let ackPending = null; // { seq, remaining } for the tile batch currently being decoded

  function maybeAck(entry) {
    if (!entry) return;
    entry.remaining -= 1;
    if (entry.remaining <= 0 && dataChannel && dataChannel.readyState === 'open') {
      const ack = new ArrayBuffer(4);
      new DataView(ack).setUint32(0, entry.seq, true);
      dataChannel.send(ack);
    }
  }

  // Server address override: open this page as
  // client.html?server=100.x.x.x:9001&token=<auth token printed by the server>
  // to connect to a remote host instead of localhost.
  const pageParams = new URLSearchParams(location.search);
  const wsHost = pageParams.get('server') || 'localhost:9001';
  const wsToken = pageParams.get('token') || '';
  const wsUrl = `ws://${wsHost}?token=${encodeURIComponent(wsToken)}`;
  document.getElementById('server-label').textContent = `Server: ws://${wsHost}`;

  async function connect() {
    resetStats();

    statusDot.className = 'connecting';
    statusText.textContent = `Підключення до ${wsUrl}...`;

    try {
      console.log('Connecting to:', wsUrl);
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log('WebSocket connected, waiting for offer...');
        statusText.textContent = 'WebSocket підключено, чекаємо offer...';
      };

      ws.onmessage = async (event) => {
        try {
          const message = JSON.parse(event.data);

          if (message.type === 'offer') {
            console.log('Received offer from server');
            statusText.textContent = 'Отримано offer, створюємо з\'єднання...';
            currentSession = message.session;

            // Close stale connection on reconnect
            if (pc) {
              pc.close();
              pc = null;
              dataChannel = null;
            }

            pc = new RTCPeerConnection({
              iceServers: []
            });

            pc.oniceconnectionstatechange = () => {
              console.log('ICE connection state:', pc.iceConnectionState);
            };

            pc.onconnectionstatechange = () => {
              console.log('Connection state:', pc.connectionState);
            };

            pc.onicecandidate = (event) => {
              if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                  type: 'candidate',
                  candidate: event.candidate.toJSON(),
                  session: currentSession
                }));
              }
            };

            pc.ondatachannel = (event) => {
              console.log('DataChannel received from server:', event.channel.label);
              dataChannel = event.channel;
              dataChannel.binaryType = 'arraybuffer';

              dataChannel.onopen = () => {
                statusDot.className    = 'connected';
                statusText.textContent = 'Підключено';
                overlay.style.display  = 'none';
                console.log('DataChannel opened');
              };

              dataChannel.onmessage = (event) => {
                const receiveTime = performance.now();
                const data = event.data;
                const view = new DataView(data);
                const marker = view.getUint16(0, true);

                // Resolution header
                if (marker === 0xFFFF) {
                  const w = view.getUint16(2, true);
                  const h = view.getUint16(4, true);
                  initFrame(w, h);
                  return;
                }

                // Sequence control packet — marks the start of a tile batch.
                // The ACK is withheld until every tile in the batch has been
                // successfully decoded (see maybeAck below), not sent here on
                // marker receipt alone.
                if (marker === 0xFFFE) {
                  const seq = view.getUint32(2, true);
                  const tileCount = view.getUint32(6, true);
                  ackPending = { seq, remaining: tileCount };
                  return;
                }

                let offset = 0;
                const now = Date.now();

                while (offset < data.byteLength) {
                  const tileLen = view.getUint32(offset, true);
                  offset += 4;

                  const tileData = data.slice(offset, offset + tileLen);
                  const tileView = new DataView(tileData);
                  const x = tileView.getUint16(0, true);
                  const y = tileView.getUint16(2, true);
                  const w = tileView.getUint16(4, true);
                  const h = tileView.getUint16(6, true);

                  const ackEntry = ackPending;
                  createImageBitmap(new Blob([tileData.slice(8)], { type: 'image/webp' }))
                    .then(bitmap => {
                      pending.push({ bitmap, x, y, w, h });
                      scheduleRaf();

                      const decodeTime = performance.now() - receiveTime;
                      latencySum += decodeTime;
                      latencyCount++;
                      maybeAck(ackEntry);
                    })
                    .catch(e => console.error('WebP decode failed:', e));
                    // Deliberately not ack'd on decode failure: withholding the
                    // ACK lets the server's ack_timeout classify this tile as
                    // stale and resend it.

                  tileCount++;
                  totalBytes += tileLen;
                  offset += tileLen;
                }

                if (now - lastStatTime >= 1000) {
                  tilesEl.textContent    = tileCount;
                  frameSizeEl.textContent = (totalBytes * 8 / 1000).toFixed(0) + ' кбіт/с';
                  latencyEl.textContent  = latencyCount
                    ? (latencySum / latencyCount).toFixed(1) + ' мс'
                    : '—';

                  tileCount     = 0;
                  totalBytes    = 0;
                  latencySum    = 0;
                  latencyCount  = 0;
                  lastStatTime  = now;
                }
              };

              dataChannel.onclose = () => {
                console.log('DataChannel closed, waiting for reconnect...');
                statusDot.className = 'connecting';
                statusText.textContent = 'Перепідключення...';
                dataChannel = null;
              };

              dataChannel.onerror = (err) => {
                console.error('DataChannel error:', err);
              };
            };

            await pc.setRemoteDescription({
              type: 'offer',
              sdp: message.sdp
            });

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            if (pc.iceGatheringState !== 'complete') {
              await Promise.race([
                new Promise((resolve) => {
                  const checkState = () => {
                    console.log('ICE gathering state:', pc.iceGatheringState);
                    if (pc.iceGatheringState === 'complete') {
                      pc.removeEventListener('icegatheringstatechange', checkState);
                      resolve();
                    }
                  };
                  pc.addEventListener('icegatheringstatechange', checkState);
                }),
                new Promise(resolve => setTimeout(resolve, 3000))
              ]);
            }

            console.log('Sending answer to server');

            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({
                type: 'answer',
                sdp: pc.localDescription.sdp,
                session: currentSession
              }));
            }
          } else if (message.type === 'candidate' && pc) {
            if (message.candidate) {
              try {
                await pc.addIceCandidate(new RTCIceCandidate(message.candidate));
              } catch (e) {
                console.error('Error adding ICE candidate:', e);
              }
            }
          }
        } catch (err) {
          console.error('Message handling error:', err);
        }
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        statusDot.className = 'error';
        statusText.textContent = 'Помилка WebSocket';
      };

      ws.onclose = () => {
        console.log('WebSocket closed');
        statusDot.className = 'error';
        statusText.textContent = 'З\'єднання закрито';
      };

    } catch (err) {
      console.error('Connection failed:', err);
      statusDot.className = 'error';
      statusText.textContent = 'Не вдалося підключитися';
    }
  }

  connect();
</script>
</body>
</html>
