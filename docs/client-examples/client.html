<!DOCTYPE html>
<html lang="uk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Ring-2Zero</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #statusbar {
    padding: 0 16px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #666;
    flex-shrink: 0;
    height: 36px;
    align-items: center;
  }
  #statusbar span { color: #e0e0e0; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; display: inline-block; margin-right: 6px;
    transition: background 0.3s;
  }
  #status-dot.connected { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
  #status-dot.connecting { background: #fbbf24; }
  #status-dot.error     { background: #f87171; }
  #btn-mode {
    margin-left: auto; padding: 2px 10px;
    background: #222; border: 1px solid #444; color: #e0e0e0;
    font-family: 'Courier New', monospace; font-size: 11px;
    cursor: pointer; border-radius: 3px; user-select: none;
  }
  #btn-mode:hover { background: #333; }

  #viewport {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  #viewport.scroll { overflow: auto; }

  #display-canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    background: #000;
  }

  #overlay {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; color: #444; pointer-events: none; z-index: 10;
  }
  #overlay p { font-size: 14px; margin-top: 8px; }

  #password-overlay {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: #0a0a0a;
    z-index: 20;
  }
  #password-form {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    width: 240px;
  }
  #password-form h1 {
    font-size: 20px; letter-spacing: 1px; margin-bottom: 8px; color: #e0e0e0;
  }
  #password-row {
    display: flex; width: 100%; gap: 8px;
  }
  #password-input {
    flex: 1; min-width: 0; padding: 10px 12px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
    color: #e0e0e0; font-family: inherit; font-size: 14px;
  }
  #password-input:focus { outline: none; border-color: #666; }
  #password-toggle {
    flex-shrink: 0; padding: 10px 12px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
    cursor: pointer; font-size: 14px;
  }
  #password-form button[type="submit"] {
    width: 100%; padding: 10px 12px;
    background: #2a2a2a; border: 1px solid #444; border-radius: 6px;
    color: #e0e0e0; font-family: inherit; font-size: 14px; cursor: pointer;
  }
  #password-form button[type="submit"]:hover { background: #333; }
  #password-toggle:hover { background: #333; }
  #password-error {
    display: none;
    color: #e05555; font-size: 13px;
  }
</style>
</head>
<body>

<div id="statusbar">
  <div><span id="status-dot"></span><span id="status-text">Підключення...</span></div>
  <div>Тайлів/с: <span id="tiles">—</span></div>
  <div>Трафік: <span id="frame-size">—</span></div>
  <div>Латентність: <span id="latency">—</span></div>
  <div>Розмір: <span id="info">—</span></div>
  <div>Debug: <span id="debug-info">—</span></div>
  <button id="btn-mode">FIT</button>
</div>

<div id="viewport">
  <canvas id="display-canvas"></canvas>
  <div id="overlay"><p>Очікування підключення через WebRTC...<br><small id="server-label">Server: ws://localhost:9001</small></p></div>
  <div id="password-overlay">
    <form id="password-form">
      <h1>Ring-2Zero</h1>
      <div id="password-row">
        <input id="password-input" type="password" placeholder="Пароль" autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false" autofocus>
        <button type="button" id="password-toggle">👁</button>
      </div>
      <button type="submit">Увійти</button>
      <p id="password-error">Невірний пароль</p>
    </form>
  </div>
</div>

<script>
  const viewport    = document.getElementById('viewport');
  const dispCanvas  = document.getElementById('display-canvas');
  const dispCtx     = dispCanvas.getContext('2d', {
    alpha: false,
    desynchronized: true
  });
  const overlay     = document.getElementById('overlay');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const tilesEl     = document.getElementById('tiles');
  const frameSizeEl = document.getElementById('frame-size');
  const latencyEl   = document.getElementById('latency');
  const infoEl      = document.getElementById('info');
  const btnMode     = document.getElementById('btn-mode');
  const passwordOverlay = document.getElementById('password-overlay');
  const passwordForm    = document.getElementById('password-form');
  const passwordInput   = document.getElementById('password-input');
  const passwordError   = document.getElementById('password-error');
  const passwordToggle  = document.getElementById('password-toggle');
  passwordToggle.addEventListener('click', () => {
    passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
  });

  let mode    = 'fit';
  let screenW = 0;
  let screenH = 0;

  let offscreen = null;
  let offCtx    = null;
  let dst = { x: 0, y: 0, w: 0, h: 0 };

  const pending = [];
  let rafId = null;

  function scheduleRaf() {
    if (!rafId) rafId = requestAnimationFrame(renderFrame);
  }

  function renderFrame() {
    rafId = null;
    if (!offscreen) return;

    for (const { bitmap, x, y, w, h } of pending) {
      offCtx.drawImage(bitmap, x, y, w, h);
      bitmap.close();
    }
    pending.length = 0;

    if (mode === 'fit') {
      dispCtx.clearRect(0, 0, dispCanvas.width, dispCanvas.height);
    }
    dispCtx.drawImage(offscreen, dst.x, dst.y, dst.w, dst.h);
  }

  function applyMode() {
    if (!screenW) return;
    const dpr  = window.devicePixelRatio || 1;
    const rect = viewport.getBoundingClientRect();
    const vw   = rect.width;
    const vh   = rect.height;
    if (!vw || !vh) return;

    if (mode === 'fit') {
      viewport.classList.remove('scroll');
      btnMode.textContent = 'FIT';
      const scale = Math.min(vw / screenW, vh / screenH);
      const dw = Math.round(screenW * scale);
      const dh = Math.round(screenH * scale);
      dst = {
        x: Math.round((vw - dw) / 2) * dpr,
        y: Math.round((vh - dh) / 2) * dpr,
        w: dw * dpr,
        h: dh * dpr
      };
      dispCanvas.width        = Math.round(vw * dpr);
      dispCanvas.height       = Math.round(vh * dpr);
      dispCanvas.style.width  = vw + 'px';
      dispCanvas.style.height = vh + 'px';
    } else {
      viewport.classList.add('scroll');
      btnMode.textContent = '1:1';
      dst = { x: 0, y: 0, w: screenW, h: screenH };
      dispCanvas.width        = screenW;
      dispCanvas.height       = screenH;
      dispCanvas.style.width  = screenW + 'px';
      dispCanvas.style.height = screenH + 'px';
    }
    if (offscreen) scheduleRaf();
  }

  function initFrame(w, h) {
    screenW = w;
    screenH = h;
    offscreen = new OffscreenCanvas(w, h);
    offCtx    = offscreen.getContext('2d', { alpha: false });
    infoEl.textContent = w + 'x' + h;
    requestAnimationFrame(applyMode);
  }

  btnMode.addEventListener('click', () => {
    mode = mode === 'fit' ? 'scroll' : 'fit';
    applyMode();
  });

  window.addEventListener('resize', () => {
    requestAnimationFrame(() => { if (mode === 'fit') applyMode(); });
  });

  // Статистика
  let tileCount     = 0;
  let totalBytes    = 0;
  let lastStatTime  = 0;
  let latencySum    = 0;
  let latencyCount  = 0;

  function resetStats() {
    tileCount     = 0;
    totalBytes    = 0;
    lastStatTime  = Date.now();
    latencySum    = 0;
    latencyCount  = 0;
  }

  // WebRTC з мінімальною латентністю
  let pc = null;
  let dataChannel = null;
  let ws = null;
  let currentSession = null; // echoed back to the server so it can tell a
                              // stale (abandoned) negotiation attempt apart
                              // from the current one after a reconnect
  let ackPending = null; // { seq, remaining } for the tile batch currently being decoded
  let decodeOkCount = 0;
  let decodeFailCount = 0;
  let msgCount = 0;
  let ackMsgCount = 0;
  let tileMsgCount = 0;

  const debugInfoEl = document.getElementById('debug-info');
  setInterval(() => {
    debugInfoEl.textContent =
      `msgs=${msgCount} ack=${ackMsgCount} tileMsgs=${tileMsgCount} ` +
      `decoded=${decodeOkCount} failed=${decodeFailCount} pending=${pending.length} ` +
      `screen=${screenW}x${screenH} canvas=${dispCanvas.width}x${dispCanvas.height}`;
  }, 1000);

  function maybeAck(entry) {
    if (!entry) return;
    entry.remaining -= 1;
    if (entry.remaining <= 0 && dataChannel && dataChannel.readyState === 'open') {
      const ack = new ArrayBuffer(4);
      new DataView(ack).setUint32(0, entry.seq, true);
      dataChannel.send(ack);
    }
  }

  // Server address override: open this page as client.html?server=100.x.x.x:9001
  // to connect to a different host. Defaults to this deployment's fixed address
  // so the plain URL (no query params at all) works as a bookmarkable link.
  const pageParams = new URLSearchParams(location.search);
  const wsHost = pageParams.get('server') || 'ring2zero.tail2ef003.ts.net:9001';
  // Match the page's own scheme: a page loaded over https must use wss (Safari
  // blocks ws:// as mixed content from a secure page, and requires https for
  // WebRTC to work at all).
  const wsScheme = location.protocol === 'https:' ? 'wss' : 'ws';
  document.getElementById('server-label').textContent = `Server: ${wsScheme}://${wsHost}`;

  const TOKEN_STORAGE_KEY = 'ring2zero_token';

  function buildWsUrl(token) {
    return `${wsScheme}://${wsHost}?token=${encodeURIComponent(token)}`;
  }

  // Password gate: ask once, remember on this device (localStorage) so the
  // bookmarked link doesn't need the token pasted into the URL bar (visible
  // in history/autocomplete) every time.
  function promptForToken(showError) {
    return new Promise((resolve) => {
      passwordOverlay.style.display = 'flex';
      passwordError.style.display = showError ? 'block' : 'none';
      passwordInput.value = '';
      passwordInput.focus();
      passwordForm.onsubmit = (e) => {
        e.preventDefault();
        const value = passwordInput.value;
        if (!value) return;
        passwordOverlay.style.display = 'none';
        resolve(value);
      };
    });
  }

  let lastAuthFailed = false;
  // A close-before-open could mean a wrong token, but the WebSocket API
  // doesn't expose the HTTP status code, so it's equally consistent with a
  // transient network blip or a server restart. Only wipe a *cached*
  // (previously working) token after it fails this many times in a row —
  // a fresh, just-typed token is still treated as wrong on the first try,
  // since that's genuinely its first use.
  let cachedAuthFailCount = 0;
  const MAX_CACHED_AUTH_RETRIES = 3;

  async function connect() {
    resetStats();

    let token = localStorage.getItem(TOKEN_STORAGE_KEY);
    const usedCachedToken = !!token;
    if (!token) {
      token = await promptForToken(lastAuthFailed);
      lastAuthFailed = false;
    }
    const wsUrl = buildWsUrl(token);

    statusDot.className = 'connecting';
    statusText.textContent = `Підключення до ${wsScheme}://${wsHost}...`;

    try {
      console.log('Connecting to:', wsUrl);
      ws = new WebSocket(wsUrl);
      let wsOpened = false;

      ws.onopen = () => {
        wsOpened = true;
        cachedAuthFailCount = 0;
        localStorage.setItem(TOKEN_STORAGE_KEY, token);
        console.log('WebSocket connected, waiting for offer...');
        statusText.textContent = 'WebSocket підключено, чекаємо offer...';
      };

      ws.onmessage = async (event) => {
        try {
          const message = JSON.parse(event.data);

          if (message.type === 'offer') {
            console.log('Received offer from server');
            statusText.textContent = 'Отримано offer, створюємо з\'єднання...';
            currentSession = message.session;

            // Close stale connection on reconnect
            if (pc) {
              pc.close();
              pc = null;
              dataChannel = null;
            }

            pc = new RTCPeerConnection({
              iceServers: []
            });

            pc.oniceconnectionstatechange = () => {
              console.log('ICE connection state:', pc.iceConnectionState);
            };

            pc.onconnectionstatechange = () => {
              console.log('Connection state:', pc.connectionState);
            };

            pc.onicecandidate = (event) => {
              if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                  type: 'candidate',
                  candidate: event.candidate.toJSON(),
                  session: currentSession
                }));
              }
            };

            pc.ondatachannel = (event) => {
              console.log('DataChannel received from server:', event.channel.label);
              dataChannel = event.channel;
              dataChannel.binaryType = 'arraybuffer';

              dataChannel.onopen = () => {
                statusDot.className    = 'connected';
                statusText.textContent = 'Підключено';
                overlay.style.display  = 'none';
                console.log('DataChannel opened');
              };

              dataChannel.onmessage = (event) => {
                msgCount++;
                const receiveTime = performance.now();
                const data = event.data;
                const view = new DataView(data);
                const marker = view.getUint16(0, true);

                // Resolution header
                if (marker === 0xFFFF) {
                  const w = view.getUint16(2, true);
                  const h = view.getUint16(4, true);
                  initFrame(w, h);
                  return;
                }

                // Sequence control packet — marks the start of a tile batch.
                // The ACK is withheld until every tile in the batch has been
                // successfully decoded (see maybeAck below), not sent here on
                // marker receipt alone.
                if (marker === 0xFFFE) {
                  ackMsgCount++;
                  const seq = view.getUint32(2, true);
                  const tileCount = view.getUint32(6, true);
                  ackPending = { seq, remaining: tileCount };
                  return;
                }

                tileMsgCount++;
                let offset = 0;
                const now = Date.now();

                while (offset < data.byteLength) {
                  const tileLen = view.getUint32(offset, true);
                  offset += 4;

                  const tileData = data.slice(offset, offset + tileLen);
                  const tileView = new DataView(tileData);
                  const x = tileView.getUint16(0, true);
                  const y = tileView.getUint16(2, true);
                  const w = tileView.getUint16(4, true);
                  const h = tileView.getUint16(6, true);

                  const ackEntry = ackPending;
                  createImageBitmap(new Blob([tileData.slice(8)], { type: 'image/webp' }))
                    .then(bitmap => {
                      pending.push({ bitmap, x, y, w, h });
                      scheduleRaf();
                      decodeOkCount++;

                      const decodeTime = performance.now() - receiveTime;
                      latencySum += decodeTime;
                      latencyCount++;
                      maybeAck(ackEntry);
                    })
                    .catch(e => {
                      decodeFailCount++;
                      console.error('WebP decode failed:', e);
                      statusText.textContent = `Decode fail ${decodeFailCount}/${decodeFailCount + decodeOkCount}: ${e && e.message ? e.message : e}`;
                    });
                    // Deliberately not ack'd on decode failure: withholding the
                    // ACK lets the server's ack_timeout classify this tile as
                    // stale and resend it.

                  tileCount++;
                  totalBytes += tileLen;
                  offset += tileLen;
                }

                if (now - lastStatTime >= 1000) {
                  tilesEl.textContent    = tileCount;
                  frameSizeEl.textContent = (totalBytes * 8 / 1000).toFixed(0) + ' кбіт/с';
                  latencyEl.textContent  = latencyCount
                    ? (latencySum / latencyCount).toFixed(1) + ' мс'
                    : '—';

                  tileCount     = 0;
                  totalBytes    = 0;
                  latencySum    = 0;
                  latencyCount  = 0;
                  lastStatTime  = now;
                }
              };

              dataChannel.onclose = () => {
                console.log('DataChannel closed, waiting for reconnect...');
                statusDot.className = 'connecting';
                statusText.textContent = 'Перепідключення...';
                dataChannel = null;
              };

              dataChannel.onerror = (err) => {
                console.error('DataChannel error:', err);
              };
            };

            await pc.setRemoteDescription({
              type: 'offer',
              sdp: message.sdp
            });

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            if (pc.iceGatheringState !== 'complete') {
              await Promise.race([
                new Promise((resolve) => {
                  const checkState = () => {
                    console.log('ICE gathering state:', pc.iceGatheringState);
                    if (pc.iceGatheringState === 'complete') {
                      pc.removeEventListener('icegatheringstatechange', checkState);
                      resolve();
                    }
                  };
                  pc.addEventListener('icegatheringstatechange', checkState);
                }),
                new Promise(resolve => setTimeout(resolve, 3000))
              ]);
            }

            console.log('Sending answer to server');

            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({
                type: 'answer',
                sdp: pc.localDescription.sdp,
                session: currentSession
              }));
            }
          } else if (message.type === 'candidate' && pc) {
            if (message.candidate) {
              try {
                await pc.addIceCandidate(new RTCIceCandidate(message.candidate));
              } catch (e) {
                console.error('Error adding ICE candidate:', e);
              }
            }
          }
        } catch (err) {
          console.error('Message handling error:', err);
          statusText.textContent = 'Помилка: ' + (err && err.message ? err.message : String(err));
        }
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        statusDot.className = 'error';
        statusText.textContent = 'Помилка WebSocket';
      };

      ws.onclose = () => {
        console.log('WebSocket closed');
        statusDot.className = 'error';
        if (!wsOpened) {
          // Never got past the handshake. A freshly-typed token failing on
          // its first use is very likely just wrong — reprompt right away.
          // A *cached* token (one that worked before) gets a few retries
          // first, since this same symptom equally means "server briefly
          // unreachable" and wiping a good token on a network blip forces
          // the user to retype a password that was never wrong.
          if (!usedCachedToken || ++cachedAuthFailCount >= MAX_CACHED_AUTH_RETRIES) {
            localStorage.removeItem(TOKEN_STORAGE_KEY);
            lastAuthFailed = true;
            cachedAuthFailCount = 0;
            statusText.textContent = 'Не вдалося увійти — можливо, невірний пароль';
            setTimeout(connect, 300);
          } else {
            statusText.textContent = `Не вдалося підключитися, повторна спроба (${cachedAuthFailCount}/${MAX_CACHED_AUTH_RETRIES})...`;
            setTimeout(connect, 1000);
          }
        } else {
          statusText.textContent = 'З\'єднання закрито';
        }
      };

    } catch (err) {
      console.error('Connection failed:', err);
      statusDot.className = 'error';
      statusText.textContent = 'Не вдалося підключитися: ' + (err && err.message ? err.message : String(err));
    }
  }

  connect();
</script>
</body>
</html>
